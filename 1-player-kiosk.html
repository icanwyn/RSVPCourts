<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CourtSync — Player Kiosk</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--court:#071c0f;--lime:#c1ff72;--lime-glow:rgba(193,255,114,.18);--white:#eef5e8;--muted:#5a8060;--dark:#040e08;--warn:#ffb347;--danger:#ff6b6b}
html,body{height:100%;overflow:hidden;background:var(--court);color:var(--white);font-family:'Outfit',sans-serif}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(193,255,114,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(193,255,114,.035) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.orb{position:fixed;bottom:-200px;right:-200px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(193,255,114,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(1rem,4vw,2.5rem)}
.header{text-align:center;margin-bottom:clamp(1.2rem,3.5vh,2.2rem)}
.gym-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,8vw,76px);letter-spacing:.1em;color:var(--lime);text-shadow:0 0 80px rgba(193,255,114,.25);line-height:1}
.gym-sub{font-size:clamp(10px,1.4vw,12px);font-weight:300;color:var(--muted);letter-spacing:.25em;text-transform:uppercase;margin-top:7px}
.card{width:100%;max-width:500px;background:rgba(255,255,255,.035);border:1px solid rgba(193,255,114,.13);border-radius:28px;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,.55)}
.screen{display:none;flex-direction:column;padding:clamp(1.4rem,5vw,2.4rem) clamp(1.2rem,4vw,2rem);gap:1.35rem;animation:rise .38s cubic-bezier(.34,1.26,.64,1)}
.screen.active{display:flex}
@keyframes rise{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.s-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,5vw,36px);letter-spacing:.06em;line-height:1.1}
.s-sub{font-size:14px;color:var(--muted);line-height:1.65;margin-top:-5px}
.field{display:flex;flex-direction:column;gap:7px}
.flabel{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.15em;color:var(--muted)}
.field input,.field select{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:clamp(11px,2.5vw,15px) 18px;font-family:'Outfit',sans-serif;font-size:clamp(15px,2.5vw,19px);font-weight:500;color:var(--white);outline:none;transition:border-color .2s,background .2s;width:100%}
.field input::placeholder{color:rgba(255,255,255,.18)}
.field input:focus,.field select:focus{border-color:var(--lime);background:rgba(193,255,114,.06)}
.btn-main{width:100%;padding:clamp(13px,3vw,17px);background:var(--lime);color:var(--dark);border:none;border-radius:16px;font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,3.5vw,23px);letter-spacing:.1em;cursor:pointer;transition:transform .15s,box-shadow .15s,opacity .2s;box-shadow:0 4px 28px rgba(193,255,114,.22)}
.btn-main:disabled{opacity:.25;cursor:not-allowed}
.note{display:flex;align-items:flex-start;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px 14px;font-size:13px;color:var(--muted);line-height:1.55}
.code-box{background:rgba(193,255,114,.07);border:2px solid rgba(193,255,114,.28);border-radius:20px;padding:1.75rem 1rem;text-align:center}
.code-val{font-family:'Bebas Neue',sans-serif;font-size:clamp(46px,10vw,66px);letter-spacing:.14em;color:var(--lime)}
</style>
</head>
<body>
<div class="orb"></div>
<div class="app">
  <div class="header">
    <div class="gym-name" id="gymName">LOADING...</div>
    <div class="gym-sub" id="gymSub">Player Check-In</div>
  </div>
  <div class="card">

    <!-- Entry -->
    <div class="screen active" id="s-entry">
      <div><div class="s-title">Hello!<br>Who are you?</div><div class="s-sub" id="feeInfo">Pay at front desk first</div></div>
      <div class="field"><div class="flabel">Full name</div><input type="text" id="nameInput" placeholder="First & last name" oninput="onNameType()"></div>
      <div class="field"><div class="flabel">Pass type</div><select id="passSelect"></select></div>
      <button class="btn-main" id="submitBtn" onclick="submitRequest()" disabled>SUBMIT TO FRONT DESK →</button>
      <div class="note">Staff will confirm payment and issue your code.</div>
    </div>

    <!-- Waiting -->
    <div class="screen" id="s-waiting">
      <div style="text-align:center">
        <div class="s-title" id="waitName">HI!</div>
        <div class="s-sub">Waiting for staff approval...</div>
      </div>
    </div>

    <!-- Code -->
    <div class="screen" id="s-code">
      <div style="text-align:center"><div class="s-title" id="codeGreeting">YOUR CODE IS READY!</div></div>
      <div class="code-box">
        <div class="code-val" id="codeVal">——</div>
        <div id="codeOwner" style="margin-top:8px;color:#aaa"></div>
      </div>
      <button class="btn-main" onclick="goHome()">CHECK IN ANOTHER PLAYER</button>
    </div>

    <!-- Declined -->
    <div class="screen" id="s-declined">
      <div style="text-align:center;color:#ff6b6b"><div class="s-title">REQUEST DECLINED</div></div>
      <button class="btn-main" onclick="goHome()">TRY AGAIN</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const GYM_SLUG = new URLSearchParams(window.location.search).get('gym') || '';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let gymData = null;
let currentPlayerId = null;
let realtimeSub = null;

async function init() {
  try {
    const { data } = await db.from('gyms').select('*').eq('slug', GYM_SLUG).single();
    if (!data) throw new Error();
    gymData = data;

    document.getElementById('gymName').textContent = data.name.toUpperCase();
    document.getElementById('gymSub').textContent = `${data.sport} • ${data.num_courts} Courts`;

    // Pass options with fees
    const sel = document.getElementById('passSelect');
    sel.innerHTML = `
      <option value="day">Day Pass — $${data.day_fee} • expires midnight</option>
      <option value="week">Week Pass — $${data.week_fee} • 7 days</option>
      <option value="month">Monthly Member — $${data.month_fee} • 30 days</option>
    `;
  } catch(e) {
    alert('Gym not found. Use ?gym=YOUR-SLUG in the URL.');
  }
}

function onNameType() {
  document.getElementById('submitBtn').disabled = document.getElementById('nameInput').value.trim().length < 2;
}

async function submitRequest() {
  const name = document.getElementById('nameInput').value.trim();
  const pass = document.getElementById('passSelect').value;
  if (!gymData || !name) return;

  const { data, error } = await db.from('players').insert({
    gym_id: gymData.id,
    name,
    pass_type: pass,
    code: null,
    status: 'pending',
    expires_at: expiryFor(pass)
  }).select().single();

  if (error) { console.error(error); return; }

  currentPlayerId = data.id;
  document.getElementById('waitName').textContent = name.split(' ')[0].toUpperCase();
  showScreen('s-waiting');
  listenForApproval(data.id);
}

function expiryFor(pass) {
  const d = new Date();
  if (pass === 'day') d.setHours(23,59,59,999);
  else if (pass === 'week') d.setDate(d.getDate() + 7);
  else d.setDate(d.getDate() + 30);
  return d.toISOString();
}

function listenForApproval(id) {
  if (realtimeSub) db.removeChannel(realtimeSub);
  realtimeSub = db.channel('player-'+id)
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'players', filter:`id=eq.${id}`}, 
      ({new: p}) => {
        if (p.status === 'active') revealCode(p);
        if (p.status === 'revoked') showScreen('s-declined');
      }).subscribe();
}

function revealCode(p) {
  document.getElementById('codeGreeting').textContent = `YOUR CODE IS READY, ${p.name.split(' ')[0].toUpperCase()}!`;
  document.getElementById('codeVal').textContent = p.code;
  document.getElementById('codeOwner').textContent = `${p.name} • ${p.pass_type.toUpperCase()}`;
  showScreen('s-code');
}

function goHome() {
  if (realtimeSub) db.removeChannel(realtimeSub);
  document.getElementById('nameInput').value = '';
  document.getElementById('submitBtn').disabled = true;
  showScreen('s-entry');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function updateClock() {
  // optional
}
init();
</script>
</body>
</html>
