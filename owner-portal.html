<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP Courts — Owner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Syne:wght@700;800&amp;display=swap" rel="stylesheet">
<style>
:root {
  --green: #1a7a4a;
}
* { box-sizing: border-box; }
body {
  font-family: 'Inter', system_ui, sans-serif;
  background: #f8faf8;
  margin: 0;
  padding: 0;
}
.topbar {
  display: none;
  background: white;
  border-bottom: 1px solid #e5e7eb;
  padding: 12px 24px;
  align-items: center;
  justify-content: space-between;
}
.topbar.show { display: flex; }
.logo { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--green); }
.dashboard {
  max-width: 1100px;
  margin: 40px auto;
  padding: 0 24px;
}
h1 { font-size: 28px; margin: 0 0 8px; }
.subtitle { color: #6b7280; margin-bottom: 32px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 24px;
  transition: all 0.2s ease;
}
.card:hover {
  border-color: #1a7a4a;
  box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
}

.card h3 {
  margin: 0 0 8px;
  color: #1a7a4a;
  font-size: 18px;
}
.card p {
  color: #6b7280;
  font-size: 14px;
  margin: 0 0 16px;
  line-height: 1.5;
}

.link {
  background: #f3f4f6;
  padding: 10px 12px;
  border-radius: 8px;
  font-family: monospace;
  font-size: 13px;
  word-break: break-all;
  margin-bottom: 16px;
}

.btn {
  display: inline-block;
  padding: 10px 18px;
  background: #1a7a4a;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  border: none;
  cursor: pointer;
}
.btn.secondary {
  background: #f3f4f6;
  color: #374151;
}
.btn.red {
  background: #c0392b;
}

@media (max-width: 640px) {
  .grid {
    grid-template-columns: 1fr;
  }
  .dashboard {
    padding: 0 16px;
  }
}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar" id="topbar">
  <div class="logo">RSVP Courts</div>
  <div>
    <span id="userEmail" style="margin-right: 16px; font-size: 14px;"></span>
    <button onclick="forceLogout()" class="btn red" style="padding: 8px 16px; font-size: 13px;">Sign Out</button>
  </div>
</div>

<!-- Main Dashboard -->
<div class="dashboard" id="dashboard" style="display: none;">
  <h1 id="gymName">Loading...</h1>
  <div class="subtitle" id="gymSlug"></div>

  <div class="grid">

    <!-- Player Kiosk -->
    <div class="card">
      <h3>📱 Player Kiosk</h3>
      <p>Players enter their name after paying and receive a check-in code.</p>
      <div class="link" id="kioskLink"></div>
      <button class="btn" onclick="openTool('kiosk')">Open Kiosk</button>
      <button class="btn secondary" onclick="copyLink('kioskLink')" style="margin-left: 8px;">Copy Link</button>
    </div>

    <!-- Front Desk -->
    <div class="card">
      <h3>🖥️ Front Desk</h3>
      <p>Staff confirm payments and issue codes in real time.</p>
      <div class="link" id="frontdeskLink"></div>
      <button class="btn" onclick="openTool('frontdesk')">Open Front Desk</button>
      <button class="btn secondary" onclick="copyLink('frontdeskLink')" style="margin-left: 8px;">Copy Link</button>
    </div>

    <!-- Court Validator -->
    <div class="card">
      <h3>🎾 Court Validator</h3>
      <p>Players enter their code at the court to join or get in queue.</p>
      <div class="link" id="validatorLink"></div>
      <button class="btn" onclick="openTool('validator')">Open Validator</button>
      <button class="btn secondary" onclick="copyLink('validatorLink')" style="margin-left: 8px;">Copy Link</button>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentGym = null;

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('userEmail').textContent = currentUser.email;
    document.getElementById('topbar').classList.add('show');
    await loadGym();
  } else {
    window.location.reload();
  }
});

async function loadGym() {
  const { data, error } = await sb
    .from('gyms')
    .select('*')
    .eq('owner_id', currentUser.id)
    .maybeSingle();

  if (error || !data) {
    document.getElementById('gymName').textContent = 'No gym found';
    return;
  }

  currentGym = data;
  renderDashboard();
}

function renderDashboard() {
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('gymName').textContent = currentGym.name;
  document.getElementById('gymSlug').textContent = currentGym.slug;

  const base = 'https://rsvp-courts.vercel.app';

  const kiosk = `${base}/1-player-kiosk.html?gym=${currentGym.slug}`;
  const front = `${base}/2-front-desk.html?gym=${currentGym.slug}`;
  const validator = `${base}/3-court-validator.html?gym=${currentGym.slug}`;

  document.getElementById('kioskLink').textContent = kiosk;
  document.getElementById('frontdeskLink').textContent = front;
  document.getElementById('validatorLink').textContent = validator;

  // Store for buttons
  window.kioskUrl = kiosk;
  window.frontdeskUrl = front;
  window.validatorUrl = validator;
}

function openTool(type) {
  if (type === 'kiosk') window.open(window.kioskUrl, '_blank');
  if (type === 'frontdesk') window.open(window.frontdeskUrl, '_blank');
  if (type === 'validator') window.open(window.validatorUrl, '_blank');
}

function copyLink(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btns = document.querySelectorAll('button');
    // simple feedback
    alert('Link copied to clipboard!');
  });
}

function forceLogout() {
  sb.auth.signOut({ scope: 'global' });
  localStorage.clear();
  location.reload();
}
</script>
</body>
</html>
