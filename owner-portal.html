<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSVP Courts — Owner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#f4f6f3;color:#0d1a0f}
.topbar{display:none;background:white;border-bottom:1px solid #e0e8e0;padding:0 24px;height:56px;align-items:center;justify-content:space-between}
.topbar.show{display:flex}
.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:#1a7a4a}
.dashboard{max-width:1100px;margin:40px auto;padding:0 24px}
h1{font-family:'Syne',sans-serif;font-size:32px;margin-bottom:8px}
.card{background:white;border-radius:16px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,0.06);margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px}
.tool-card{border:1px solid #e0e8e0;border-radius:12px;padding:20px;transition:all 0.2s}
.tool-card:hover{border-color:#1a7a4a;transform:translateY(-2px)}
.tool-card h3{margin-bottom:8px;color:#1a7a4a}
.tool-card p{color:#666;font-size:14px;margin-bottom:16px}
.btn{display:inline-block;padding:10px 20px;background:#1a7a4a;color:white;text-decoration:none;border-radius:8px;font-weight:600}
.btn.red{background:#c0392b}
.link-box{background:#f8f9fa;padding:12px;border-radius:8px;font-family:monospace;font-size:13px;word-break:break-all;margin:12px 0}
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar" id="topbar">
  <div class="logo">RSVP Courts</div>
  <div>
    <span id="userEmail" style="margin-right:20px"></span>
    <button onclick="forceLogout()" style="background:#c0392b;color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer">Sign Out</button>
  </div>
</div>

<!-- Dashboard -->
<div class="dashboard" id="dashboard" style="display:none">
  <h1 id="gymName">Loading...</h1>
  <p id="gymSlug" style="color:#666;margin-bottom:30px"></p>

  <div class="grid">

    <!-- Player Kiosk -->
    <div class="tool-card">
      <h3>📱 Player Kiosk</h3>
      <p>Players enter their name and get a check-in code.</p>
      <div class="link-box" id="kioskLink"></div>
      <a href="#" id="kioskBtn" target="_blank" class="btn">Open Player Kiosk</a>
      <button onclick="copyLink('kioskLink')" style="margin-left:10px;padding:10px 16px">Copy</button>
    </div>

    <!-- Front Desk -->
    <div class="tool-card">
      <h3>🖥️ Front Desk</h3>
      <p>Staff approve payments and issue codes.</p>
      <div class="link-box" id="frontdeskLink"></div>
      <a href="#" id="frontdeskBtn" target="_blank" class="btn">Open Front Desk</a>
      <button onclick="copyLink('frontdeskLink')" style="margin-left:10px;padding:10px 16px">Copy</button>
    </div>

    <!-- Court Validator -->
    <div class="tool-card">
      <h3>🎾 Court Validator</h3>
      <p>Players enter code at court to join or queue.</p>
      <div class="link-box" id="validatorLink"></div>
      <a href="#" id="validatorBtn" target="_blank" class="btn">Open Court Validator</a>
      <button onclick="copyLink('validatorLink')" style="margin-left:10px;padding:10px 16px">Copy</button>
    </div>

  </div>

  <div style="margin-top:40px">
    <button onclick="goToSettings()" style="padding:12px 24px">⚙ Manage Settings</button>
  </div>
</div>

<!-- Onboarding -->
<div id="onboarding" style="display:none; max-width:500px; margin:60px auto; text-align:center">
  <div class="card">
    <h2>Create your first gym</h2>
    <input type="text" id="gymNameInput" placeholder="Gym Name" style="width:100%;padding:12px;margin:20px 0;border:1px solid #ccc;border-radius:8px">
    <button onclick="createGym()" class="btn" style="width:100%">Create Gym</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentGym = null;

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('userEmail').textContent = currentUser.email;
    document.getElementById('topbar').classList.add('show');
    await loadGym();
  } else {
    window.location.reload();
  }
});

async function loadGym() {
  const { data } = await sb.from('gyms').select('*').eq('owner_id', currentUser.id).maybeSingle();

  if (data) {
    currentGym = data;
    showDashboard();
  } else {
    document.getElementById('onboarding').style.display = 'block';
  }
}

function showDashboard() {
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('gymName').textContent = currentGym.name;
  document.getElementById('gymSlug').textContent = currentGym.slug;

  const base = 'https://rsvp-courts.vercel.app'; // Change this to your domain if different

  const kiosk = `${base}/1-player-kiosk.html?gym=${currentGym.slug}`;
  const front = `${base}/2-front-desk.html?gym=${currentGym.slug}`;
  const validator = `${base}/3-court-validator.html?gym=${currentGym.slug}`;

  document.getElementById('kioskLink').textContent = kiosk;
  document.getElementById('frontdeskLink').textContent = front;
  document.getElementById('validatorLink').textContent = validator;

  document.getElementById('kioskBtn').href = kiosk;
  document.getElementById('frontdeskBtn').href = front;
  document.getElementById('validatorBtn').href = validator;
}

function copyLink(elementId) {
  const text = document.getElementById(elementId).textContent;
  navigator.clipboard.writeText(text);
  alert('Link copied to clipboard!');
}

async function createGym() {
  const name = document.getElementById('gymNameInput').value.trim();
  if (!name) return alert('Please enter a gym name');

  const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + Date.now().toString(36).slice(-5);

  const { data, error } = await sb.from('gyms').insert({
    owner_id: currentUser.id,
    name,
    slug,
    num_courts: 4,
    players_per_court: 4,
    session_mins: 30,
    day_fee: 18,
    week_fee: 49,
    month_fee: 129
  }).select().single();

  if (error) {
    alert('Error creating gym: ' + error.message);
    return;
  }

  currentGym = data;
  document.getElementById('onboarding').style.display = 'none';
  showDashboard();
}

function forceLogout() {
  sb.auth.signOut({ scope: 'global' });
  localStorage.clear();
  location.reload();
}

function goToSettings() {
  alert('Settings page coming soon. You can manage fees, courts, etc. from here later.');
}
</script>
</body>
</html>
