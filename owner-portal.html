<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSVP Courts — Owner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
/* (same styles as before - keeping it short) */
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#1a7a4a;--bg:#f4f6f3;--surface:#fff;--dark:#0d1a0f;--muted:#6b7a6b;--border:#e0e8e0;--b2:#c8d8c8;--red:#c0392b}
html,body{min-height:100%;background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:none;align-items:center;justify-content:space-between}
.topbar.show{display:flex}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--green)}
.btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--b2);border-radius:8px;font-size:13px;cursor:pointer}
.pg{display:none}.pg.on{display:block}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;max-width:400px;margin:2rem auto}
.field{margin-bottom:13px}
.field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase}
.field input{padding:11px 13px;border:1.5px solid var(--b2);border-radius:10px;width:100%;font-size:15px}
.btn-main{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:20px;z-index:999;transition:all .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="logo">RSVP Courts</div>
  <div>
    <span id="userLbl"></span>
    <button class="btn-logout" onclick="doLogout()">Sign out</button>
  </div>
</div>

<!-- AUTH -->
<div class="pg on" id="pg-auth">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
    <div class="auth-card">
      <div style="text-align:center;font-family:'Syne',sans-serif;font-size:26px;color:var(--green);margin-bottom:8px">RSVP Courts</div>
      <div style="text-align:center;margin-bottom:20px;color:var(--muted)">Owner Portal</div>

      <div id="authErr" style="color:#c0392b;background:#fee;padding:10px;border-radius:8px;display:none;margin-bottom:12px"></div>

      <div style="display:flex;background:#f0f0f0;border-radius:10px;padding:4px;margin-bottom:20px">
        <button onclick="switchTab('in')" id="tab-in" style="flex:1;padding:8px;border-radius:7px;border:none;background:white;font-weight:600">Sign in</button>
        <button onclick="switchTab('up')" id="tab-up" style="flex:1;padding:8px;border-radius:7px;border:none;background:transparent;font-weight:600">Create account</button>
      </div>

      <div id="form-in">
        <div class="field"><label>Email</label><input type="email" id="inEmail"></div>
        <div class="field"><label>Password</label><input type="password" id="inPass"></div>
        <button class="btn-main" onclick="doSignIn()">Sign In →</button>
      </div>

      <div id="form-up" style="display:none">
        <div class="field"><label>Name</label><input type="text" id="upName"></div>
        <div class="field"><label>Email</label><input type="email" id="upEmail"></div>
        <div class="field"><label>Password</label><input type="password" id="upPass"></div>
        <button class="btn-main" onclick="doSignUp()">Create Account →</button>
      </div>
    </div>
  </div>
</div>

<!-- ONBOARDING + DASHBOARD (same as before) -->
<div class="pg" id="pg-onboard">... (keep your onboarding content) ...</div>
<div class="pg" id="pg-dash">... (keep your dashboard content) ...</div>

<div class="toast" id="toast"></div>

<script>
// ==================== SUPABASE ====================
const SB_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

let USER = null;
let GYM = null;

// ===================== IMPROVED AUTH LISTENER =====================
sb.auth.onAuthStateChange((event, session) => {
  console.log('Auth Event:', event);

  if (event === 'SIGNED_OUT' || !session) {
    USER = null;
    document.getElementById('topbar').classList.remove('show');
    show('pg-auth');
    return;
  }

  if (session?.user) {
    USER = session.user;
    document.getElementById('userLbl').textContent = USER.email;
    document.getElementById('topbar').classList.add('show');
    loadGym();
  }
});

// ===================== SIGN IN =====================
async function doSignIn() {
  const email = document.getElementById('inEmail').value.trim();
  const pass = document.getElementById('inPass').value;
  if (!email || !pass) return showErr('Enter email and password');

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showErr(error.message);
}

// ===================== SIGN UP =====================
async function doSignUp() {
  const name = document.getElementById('upName').value.trim();
  const email = document.getElementById('upEmail').value.trim();
  const pass = document.getElementById('upPass').value;
  if (!name || !email || !pass) return showErr('Fill all fields');

  const { error } = await sb.auth.signUp({ email, password: pass });
  if (error) showErr(error.message);
  else toast('Account created! Confirm your email then sign in.');
}

// ===================== STRONG LOGOUT =====================
async function doLogout() {
  try {
    // Strong sign out (clears all sessions)
    await sb.auth.signOut({ scope: 'global' });

    // Force clear everything
    USER = null;
    localStorage.clear();
    sessionStorage.clear();

    document.getElementById('topbar').classList.remove('show');
    show('pg-auth');

    toast('Signed out successfully');
    
    // Extra safety: reload page after 1 second
    setTimeout(() => location.reload(), 1000);
  } catch (err) {
    console.error(err);
    toast('Logout failed. Try hard refresh (Ctrl+Shift+R)', true);
  }
}

// ===================== LOAD GYM =====================
async function loadGym() {
  if (!USER) return;
  const { data } = await sb.from('gyms').select('*').eq('owner_id', USER.id).maybeSingle();
  
  if (data) {
    GYM = data;
    renderDashboard();
    show('pg-dash');
  } else {
    show('pg-onboard');
  }
}

// ===================== DASHBOARD + SETTINGS (keep your existing code) =====================
function renderDashboard() {
  if (!GYM) return;
  document.getElementById('d-name').textContent = GYM.name || 'Your Gym';
  const url = `${location.origin}/1-player-kiosk.html?gym=${GYM.slug}`;
  document.getElementById('kioskUrl').textContent = url;
}

function toggleSettings() { /* your existing code */ }
async function saveSettings() { /* your existing code */ }

// ===================== HELPERS =====================
function show(page) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.getElementById(page).classList.add('on');
}

function showErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function toast(msg, error = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = error ? '#c0392b' : '#1a7a4a';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(t) {
  document.getElementById('tab-in').style.background = t === 'in' ? 'white' : 'transparent';
  document.getElementById('tab-up').style.background = t === 'up' ? 'white' : 'transparent';
  document.getElementById('form-in').style.display = t === 'in' ? 'block' : 'none';
  document.getElementById('form-up').style.display = t === 'up' ? 'block' : 'none';
}
</script>
</body>
</html>
