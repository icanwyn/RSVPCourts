<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSVP Courts — Owner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: system-ui; background: #f4f6f3; padding: 40px; }
.card { background: white; padding: 30px; border-radius: 16px; max-width: 400px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; }
button { width: 100%; padding: 14px; background: #1a7a4a; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
.hidden { display: none; }
.error { color: red; background: #fee; padding: 10px; border-radius: 8px; }
</style>
</head>
<body>

<div id="topbar" style="display:none; margin-bottom:20px;">
  Logged in as: <span id="userEmail"></span>
  <button onclick="forceLogout()" style="background:#c0392b; padding:8px 16px; margin-left:20px;">Force Sign Out</button>
</div>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="card">
    <h2>RSVP Courts</h2>
    <div id="error" class="error" style="display:none;"></div>

    <input type="email" id="email" placeholder="Email" value="chuyenh@lasdschools.org">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Sign In</button>
    <button onclick="signup()" style="background:#555;">Create Account</button>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <div class="card">
    <h2 id="gymName">Loading...</h2>
    <p id="gymInfo"></p>
    <div id="kioskLink" style="background:#f0f0f0; padding:12px; border-radius:8px; margin:20px 0; font-family:monospace;"></div>
    <button onclick="copyLink()">Copy Kiosk Link</button>
    <button onclick="forceLogout()" style="background:#c0392b; margin-top:20px;">Sign Out</button>
  </div>
</div>

<!-- Onboarding -->
<div id="onboarding" class="hidden">
  <div class="card">
    <h2>Create your gym</h2>
    <input type="text" id="newGymName" placeholder="Gym Name">
    <button onclick="createGym()">Create Gym</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let gym = null;

sb.auth.onAuthStateChange((event, session) => {
  console.log('Auth event:', event, session);
  
  if (session?.user) {
    user = session.user;
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('topbar').style.display = 'block';
    loadGym();
  } else {
    showScreen('auth-screen');
    document.getElementById('topbar').style.display = 'none';
  }
});

async function login() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showError(error.message);
}

async function signup() {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  const { error } = await sb.auth.signUp({ email, password: pass });
  if (error) showError(error.message);
  else alert('Check your email to confirm account');
}

async function loadGym() {
  console.log('Loading gym for user:', user.id);

  const { data, error } = await sb
    .from('gyms')
    .select('*')
    .eq('owner_id', user.id)
    .maybeSingle();

  console.log('Gym query result:', { data, error });

  if (error) {
    showError('Error loading gym: ' + error.message);
    return;
  }

  if (data) {
    gym = data;
    showDashboard();
  } else {
    showScreen('onboarding');
  }
}

function showDashboard() {
  document.getElementById('gymName').textContent = gym.name;
  const link = `${location.origin}/1-player-kiosk.html?gym=${gym.slug}`;
  document.getElementById('kioskLink').textContent = link;
  showScreen('dashboard');
}

async function createGym() {
  const name = document.getElementById('newGymName').value.trim();
  if (!name) return alert('Enter gym name');

  const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + Date.now();

  const { data, error } = await sb.from('gyms').insert({
    owner_id: user.id,
    name,
    slug,
    num_courts: 4,
    players_per_court: 4,
    session_mins: 30
  }).select().single();

  if (error) {
    alert('Error: ' + error.message);
    return;
  }

  gym = data;
  showDashboard();
}

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('kioskLink').textContent);
  alert('Link copied!');
}

function forceLogout() {
  sb.auth.signOut({ scope: 'global' });
  localStorage.clear();
  location.reload();
}

function showScreen(id) {
  document.getElementById('auth-screen').classList.add('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('onboarding').classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
