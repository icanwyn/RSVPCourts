<script>
const SUPABASE_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const GYM_SLUG = new URLSearchParams(window.location.search).get('gym') || '';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let gymData = null;
let pendingPlayers = [];
let issuedPlayers = [];

async function init() {
  await loadGym();
  await loadPendingRequests();
  await loadIssuedToday();
  subscribeToChanges();
  // ... your original clock, render calls ...
}

async function loadGym() {
  const { data } = await db.from('gyms').select('*').eq('slug', GYM_SLUG).single();
  if (data) gymData = data;
}

async function loadPendingRequests() {
  if (!gymData) return;
  const { data } = await db.from('players').select('*')
    .eq('gym_id', gymData.id)
    .eq('status', 'pending')
    .order('issued_at', { ascending: false });
  pendingPlayers = data || [];
  renderPending();
}

async function loadIssuedToday() {
  if (!gymData) return;
  const start = new Date(); start.setHours(0,0,0,0);
  const { data } = await db.from('players').select('*')
    .eq('gym_id', gymData.id)
    .neq('status', 'pending')
    .gte('issued_at', start.toISOString());
  issuedPlayers = data || [];
  renderIssuedTable();
}

// Add this function to approve (fixed)
async function approve(playerId) {
  const code = generateCode();
  const { error } = await db.from('players').update({
    code,
    status: 'active',
    issued_at: new Date().toISOString()
  }).eq('id', playerId);

  if (error) return console.error(error);

  pendingPlayers = pendingPlayers.filter(p => p.id !== playerId);
  renderPending();
  loadIssuedToday(); // refresh issued
  showCodeModal({code}); // your modal
}

// ... rest of your original script (generateCode, render functions, etc.) ...

init();
</script>
