<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSVP Courts — Owner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { font-family: system-ui, sans-serif; background: #f4f6f3; padding: 40px; }
.card { background: white; padding: 30px; border-radius: 16px; max-width: 900px; margin: 0 auto; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
h1 { font-size: 28px; margin-bottom: 8px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 30px; }
.tool { border: 1px solid #ddd; border-radius: 12px; padding: 20px; }
.tool h3 { color: #1a7a4a; margin-bottom: 8px; }
.link { background: #f8f9fa; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 13px; margin: 12px 0; word-break: break-all; }
button { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
.btn-green { background: #1a7a4a; color: white; }
.btn-red { background: #c0392b; color: white; }
.topbar { display: none; margin-bottom: 30px; }
</style>
</head>
<body>

<div class="topbar" id="topbar">
  Logged in as: <strong id="userEmail"></strong>
  <button onclick="forceLogout()" class="btn-red" style="margin-left: 20px;">Sign Out</button>
</div>

<div id="content">
  <div class="card">
    <h1 id="gymTitle">Loading...</h1>
    <p id="gymSlug"></p>

    <div class="grid">

      <div class="tool">
        <h3>📱 Player Kiosk</h3>
        <p>Players check in and get a code.</p>
        <div class="link" id="kioskLink"></div>
        <button class="btn-green" onclick="openLink('kiosk')">Open</button>
        <button onclick="copyLink('kioskLink')">Copy</button>
      </div>

      <div class="tool">
        <h3>🖥️ Front Desk</h3>
        <p>Approve payments &amp; issue codes.</p>
        <div class="link" id="frontdeskLink"></div>
        <button class="btn-green" onclick="openLink('frontdesk')">Open</button>
        <button onclick="copyLink('frontdeskLink')">Copy</button>
      </div>

      <div class="tool">
        <h3>🎾 Court Validator</h3>
        <p>Players join courts here.</p>
        <div class="link" id="validatorLink"></div>
        <button class="btn-green" onclick="openLink('validator')">Open</button>
        <button onclick="copyLink('validatorLink')">Copy</button>
      </div>

    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;
let gym = null;

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    user = session.user;
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('topbar').style.display = 'block';
    await loadMyGym();
  } else {
    window.location.reload();
  }
});

async function loadMyGym() {
  const { data, error } = await sb
    .from('gyms')
    .select('*')
    .eq('owner_id', user.id)
    .maybeSingle();

  if (error) {
    document.getElementById('gymTitle').textContent = 'Error loading gym';
    console.error(error);
    return;
  }

  if (data) {
    gym = data;
    showDashboard();
  } else {
    document.getElementById('gymTitle').textContent = 'No gym found. Please create one.';
  }
}

function showDashboard() {
  document.getElementById('gymTitle').textContent = gym.name;
  document.getElementById('gymSlug').textContent = gym.slug;

  const base = 'https://rsvp-courts.vercel.app';

  const k = `${base}/1-player-kiosk.html?gym=${gym.slug}`;
  const f = `${base}/2-front-desk.html?gym=${gym.slug}`;
  const v = `${base}/3-court-validator.html?gym=${gym.slug}`;

  document.getElementById('kioskLink').textContent = k;
  document.getElementById('frontdeskLink').textContent = f;
  document.getElementById('validatorLink').textContent = v;

  window.kioskUrl = k;
  window.frontdeskUrl = f;
  window.validatorUrl = v;
}

function openLink(type) {
  if (type === 'kiosk') window.open(window.kioskUrl, '_blank');
  if (type === 'frontdesk') window.open(window.frontdeskUrl, '_blank');
  if (type === 'validator') window.open(window.validatorUrl, '_blank');
}

function copyLink(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text);
  alert('Link copied!');
}

function forceLogout() {
  sb.auth.signOut({ scope: 'global' });
  localStorage.clear();
  location.reload();
}
</script>
</body>
</html>
