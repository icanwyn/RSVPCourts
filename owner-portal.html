<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RSVP Courts — Owner Portal</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a7a4a;--gl:#e6f5eb;--gm:#2d9e52;
  --bg:#f4f6f3;--surface:#fff;--dark:#0d1a0f;
  --muted:#6b7a6b;--border:#e0e8e0;--b2:#c8d8c8;
  --red:#c0392b;--rl:#fdf0ef;
}
html,body{min-height:100%;background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:none;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar.show{display:flex}
.logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--green)}
.btn-logout{padding:6px 14px;background:transparent;border:1px solid var(--b2);border-radius:8px;font-size:13px;cursor:pointer}
.pg{display:none}.pg.on{display:block}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;max-width:400px;margin:2rem auto}
.field{margin-bottom:13px}
.field label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.field input{padding:11px 13px;border:1.5px solid var(--b2);border-radius:10px;width:100%;font-size:15px}
.btn-main{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:16px;font-weight:700;cursor:pointer}
.ob-card{max-width:520px;margin:2rem auto;background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.ob-head{background:var(--green);padding:1.75rem 2rem;color:#fff}
.s-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dash{max-width:940px;margin:0 auto;padding:1.75rem 1.25rem}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:14px}
.panel-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.btn-save{padding:10px 20px;background:var(--green);color:#fff;border:none;border-radius:8px;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:20px;z-index:999;transition:all .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="logo">RSVP Courts</div>
  <div>
    <span id="userLbl" style="margin-right:15px"></span>
    <button class="btn-logout" onclick="doLogout()">Sign out</button>
  </div>
</div>

<!-- AUTH PAGE -->
<div class="pg on" id="pg-auth">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
    <div class="auth-card">
      <div style="text-align:center;font-family:'Syne',sans-serif;font-size:26px;color:var(--green);margin-bottom:8px">RSVP Courts</div>
      <div style="text-align:center;margin-bottom:20px;color:var(--muted)">Owner portal — manage your venue</div>

      <div id="authErr" style="color:#c0392b;background:#fee;padding:10px;border-radius:8px;display:none;margin-bottom:12px"></div>

      <!-- Tabs -->
      <div style="display:flex;background:#f0f0f0;border-radius:10px;padding:4px;margin-bottom:20px">
        <button onclick="switchTab('in')" id="tab-in" style="flex:1;padding:8px;border-radius:7px;border:none;background:white;font-weight:600;cursor:pointer">Sign in</button>
        <button onclick="switchTab('up')" id="tab-up" style="flex:1;padding:8px;border-radius:7px;border:none;background:transparent;font-weight:600;cursor:pointer">Create account</button>
      </div>

      <!-- Sign In Form -->
      <div id="form-in">
        <div class="field"><label>Email</label><input type="email" id="inEmail" value="chuyenh@lasdschools.org"></div>
        <div class="field"><label>Password</label><input type="password" id="inPass"></div>
        <button class="btn-main" onclick="doSignIn()">Sign In →</button>
      </div>

      <!-- Sign Up Form -->
      <div id="form-up" style="display:none">
        <div class="field"><label>Your Name</label><input type="text" id="upName"></div>
        <div class="field"><label>Email</label><input type="email" id="upEmail"></div>
        <div class="field"><label>Password</label><input type="password" id="upPass"></div>
        <button class="btn-main" onclick="doSignUp()">Create Account →</button>
      </div>
    </div>
  </div>
</div>

<!-- ONBOARDING -->
<div class="pg" id="pg-onboard">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">
    <div class="ob-card">
      <div class="ob-head">
        <h2>Set up your gym</h2>
        <p>Takes 2 minutes</p>
      </div>
      <div style="padding:1.5rem 2rem">
        <div id="ob1">
          <div style="margin-bottom:10px"><strong>Gym Name</strong></div>
          <input type="text" id="ob-name" placeholder="Vikings Badminton Club" style="width:100%;padding:12px;border:1.5px solid var(--b2);border-radius:10px">
        </div>

        <div id="ob2" style="display:none">
          <div class="s-row">
            <div><strong>Courts</strong><br><input type="number" id="ob-courts" value="4" style="width:100%;padding:10px"></div>
            <div><strong>Session mins</strong><br>
              <select id="ob-mins" style="width:100%;padding:10px">
                <option value="30" selected>30</option><option value="45">45</option><option value="60">60</option>
              </select>
            </div>
          </div>

          <div style="margin:15px 0"><strong>Players per court</strong></div>
          <div style="display:flex;gap:10px;margin-bottom:15px">
            <button onclick="setPlayers(4)" class="topt on" id="p4" style="flex:1;padding:10px">4 — Doubles</button>
            <button onclick="setPlayers(2)" class="topt" id="p2" style="flex:1;padding:10px">2 — Singles</button>
          </div>

          <div><strong>Fees</strong></div>
          <div class="s-row">
            <div>Day $ <input type="number" step="0.5" id="ob-day-fee" value="18"></div>
            <div>Week $ <input type="number" step="0.5" id="ob-week-fee" value="49"></div>
          </div>
          <div>Monthly $ <input type="number" step="0.5" id="ob-month-fee" value="129" style="width:100%;padding:10px"></div>
        </div>

        <div id="ob3" style="display:none;text-align:center;padding:40px 0">
          <h2>🎉 You're all set!</h2>
          <p>Your gym is now live.</p>
        </div>
      </div>
      <div style="padding:1rem 2rem;border-top:1px solid var(--border);display:flex;gap:10px">
        <button onclick="obBack()" id="ob-back" style="display:none">← Back</button>
        <button class="btn-main" onclick="obNext()" id="ob-next" style="flex:1">Continue →</button>
      </div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="pg" id="pg-dash">
  <div class="dash">
    <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:20px">
      <div>
        <h1 id="d-name" style="font-family:'Syne',sans-serif;font-size:28px"></h1>
        <div id="d-slug" style="font-family:monospace;font-size:13px;color:var(--muted)"></div>
      </div>
      <button onclick="toggleSettings()" style="padding:8px 16px;border:1.5px solid var(--green);color:var(--green);background:none;border-radius:8px;cursor:pointer">⚙ Settings</button>
    </div>

    <!-- Settings Panel -->
    <div class="panel" id="settingsPanel" style="display:none">
      <div class="panel-head"><strong>Gym Settings</strong></div>
      <div style="padding:16px">
        <input type="text" id="s-name" placeholder="Gym Name" style="width:100%;margin-bottom:10px;padding:10px">
        <div class="s-row">
          <div>Courts <input type="number" id="s-courts"></div>
          <div>Session mins <select id="s-mins"><option value="30">30</option><option value="45">45</option><option value="60">60</option></select></div>
        </div>
        <div style="margin:15px 0"><strong>Fees</strong></div>
        <div class="s-row">
          <div>Day $ <input type="number" step="0.5" id="s-day-fee"></div>
          <div>Week $ <input type="number" step="0.5" id="s-week-fee"></div>
        </div>
        <div>Monthly $ <input type="number" step="0.5" id="s-month-fee" style="width:100%;padding:10px"></div>
        <button class="btn-save" onclick="saveSettings()" style="margin-top:15px">Save Changes</button>
      </div>
    </div>

    <div style="margin-top:20px">
      <strong>Player Kiosk Link</strong><br>
      <div id="kioskUrl" style="background:#f0f0f0;padding:10px;border-radius:8px;font-family:monospace;word-break:break-all"></div>
      <button onclick="copyKioskUrl()" style="margin-top:8px">Copy Link</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== SUPABASE + AUTH (FIXED) ====================
const SB_URL = 'https://vsycqimhkzppautumsyo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZzeWNxaW1oa3pwcGF1dHVtc3lvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MTMyMjEsImV4cCI6MjA5MzM4OTIyMX0.upBxit5d5nA6b9oVy8CbxIbzpO2m7_Df27IgKjg3l2k';

const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

let USER = null;
let GYM = null;
let obStep = 1;

// ===================== AUTH STATE LISTENER =====================
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'SIGNED_OUT' || !session) {
    USER = null;
    GYM = null;
    document.getElementById('topbar').classList.remove('show');
    show('pg-auth');
    return;
  }

  if (session) {
    USER = session.user;
    document.getElementById('userLbl').textContent = USER.email;
    document.getElementById('topbar').classList.add('show');
    await loadGym();
  }
});

// ===================== SIGN IN =====================
async function doSignIn() {
  const email = document.getElementById('inEmail').value.trim();
  const pass = document.getElementById('inPass').value;
  if (!email || !pass) { showErr('Enter email and password'); return; }

  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showErr(error.message);
}

// ===================== SIGN UP =====================
async function doSignUp() {
  const name = document.getElementById('upName').value.trim();
  const email = document.getElementById('upEmail').value.trim();
  const pass = document.getElementById('upPass').value;
  if (!name || !email || !pass) { showErr('Fill all fields'); return; }

  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name } } });
  if (error) showErr(error.message);
  else toast('Account created! Please confirm your email then sign in.');
}

// ===================== LOGOUT =====================
async function doLogout() {
  try {
    await sb.auth.signOut();
    USER = null;
    GYM = null;
    document.getElementById('topbar').classList.remove('show');
    show('pg-auth');
    toast('Signed out');
  } catch (e) {
    toast('Logout failed', true);
  }
}

// ===================== LOAD GYM =====================
async function loadGym() {
  const { data } = await sb.from('gyms').select('*').eq('owner_id', USER.id).maybeSingle();
  if (!data) {
    show('pg-onboard');
    updateObView();
  } else {
    GYM = data;
    renderDashboard();
    show('pg-dash');
  }
}

// ===================== ONBOARDING =====================
function updateObView() {
  document.getElementById('ob1').style.display = obStep === 1 ? 'block' : 'none';
  document.getElementById('ob2').style.display = obStep === 2 ? 'block' : 'none';
  document.getElementById('ob3').style.display = obStep === 3 ? 'block' : 'none';
  document.getElementById('ob-back').style.display = obStep > 1 ? 'block' : 'none';
}

function setPlayers(n) {
  document.getElementById('p4').classList.toggle('on', n === 4);
  document.getElementById('p2').classList.toggle('on', n === 2);
}

async function obNext() {
  if (obStep === 1) {
    if (!document.getElementById('ob-name').value.trim()) return alert('Enter gym name');
    obStep = 2;
  } else if (obStep === 2) {
    await createGym();
    return;
  } else {
    show('pg-dash');
    return;
  }
  updateObView();
}

function obBack() {
  if (obStep > 1) obStep--;
  updateObView();
}

async function createGym() {
  const name = document.getElementById('ob-name').value.trim();
  const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-' + Math.random().toString(36).slice(2, 6);

  const { data, error } = await sb.from('gyms').insert({
    owner_id: USER.id,
    name,
    slug,
    sport: 'Badminton',
    num_courts: parseInt(document.getElementById('ob-courts').value) || 4,
    players_per_court: 4,
    session_mins: parseInt(document.getElementById('ob-mins').value) || 30,
    day_fee: parseFloat(document.getElementById('ob-day-fee').value) || 18,
    week_fee: parseFloat(document.getElementById('ob-week-fee').value) || 49,
    month_fee: parseFloat(document.getElementById('ob-month-fee').value) || 129,
  }).select().single();

  if (error) return alert(error.message);
  GYM = data;
  obStep = 3;
  updateObView();
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  if (!GYM) return;
  document.getElementById('d-name').textContent = GYM.name;
  const url = `${location.origin}/1-player-kiosk.html?gym=${GYM.slug}`;
  document.getElementById('d-slug').textContent = url;
  document.getElementById('kioskUrl').textContent = url;
}

function toggleSettings() {
  const p = document.getElementById('settingsPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
  if (GYM) {
    document.getElementById('s-name').value = GYM.name;
    document.getElementById('s-courts').value = GYM.num_courts;
    document.getElementById('s-mins').value = GYM.session_mins;
    document.getElementById('s-day-fee').value = GYM.day_fee;
    document.getElementById('s-week-fee').value = GYM.week_fee;
    document.getElementById('s-month-fee').value = GYM.month_fee;
  }
}

async function saveSettings() {
  if (!GYM) return;
  const updates = {
    name: document.getElementById('s-name').value,
    num_courts: parseInt(document.getElementById('s-courts').value),
    session_mins: parseInt(document.getElementById('s-mins').value),
    day_fee: parseFloat(document.getElementById('s-day-fee').value),
    week_fee: parseFloat(document.getElementById('s-week-fee').value),
    month_fee: parseFloat(document.getElementById('s-month-fee').value),
  };
  const { error } = await sb.from('gyms').update(updates).eq('id', GYM.id);
  if (error) return alert(error.message);
  Object.assign(GYM, updates);
  renderDashboard();
  toggleSettings();
  toast('Settings saved!');
}

function copyKioskUrl() {
  navigator.clipboard.writeText(document.getElementById('kioskUrl').textContent);
  toast('Link copied!');
}

// ===================== HELPERS =====================
function switchTab(t) {
  document.getElementById('tab-in').style.background = t === 'in' ? 'white' : 'transparent';
  document.getElementById('tab-up').style.background = t === 'up' ? 'white' : 'transparent';
  document.getElementById('form-in').style.display = t === 'in' ? 'block' : 'none';
  document.getElementById('form-up').style.display = t === 'up' ? 'block' : 'none';
}

function show(pageId) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.getElementById(pageId).classList.add('on');
}

function showErr(msg) {
  const el = document.getElementById('authErr');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
